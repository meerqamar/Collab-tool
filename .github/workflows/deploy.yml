name: CD — Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Run database sync
        run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build production bundle
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Deploy to Vercel Production
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deployment_url=$URL" >> $GITHUB_OUTPUT

      - name: Run post-deployment health check
        run: |
          DEPLOY_URL="${{ steps.deploy.outputs.deployment_url }}"
          echo "Testing health endpoint at: $DEPLOY_URL/api/health"
          curl -s -i "$DEPLOY_URL/api/health" | head -20
          STATUS=$(curl -s -L -o /dev/null -w "%{http_code}" "$DEPLOY_URL/api/health")
          if [ "$STATUS" -ne 200 ]; then
            echo "Health check failed with HTTP status: $STATUS"
            exit 1
          fi
          echo "Health check verified successfully (HTTP 200)!"

      - name: Notify Sentry of release
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: vision-labs
          SENTRY_PROJECT: javascript-nextjs
        with:
          environment: production
          version: ${{ github.sha }}
          ignore_missing: true